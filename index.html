<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>컨택즉흥 질문 코너</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 2rem auto; padding: 0 1rem; }
        h1 { text-align: center; }
        form { margin-bottom: 2rem; }
        textarea { width: 100%; height: 100px; }
        button { padding: 0.5rem 1rem; font-size: 1rem; }
        .question { border-bottom: 1px solid #ccc; padding: 0.5rem 0; }
    </style>
</head>
<body>
    <h1>컨택즉흥 독자 질문 코너</h1>
    <p>컨택즉흥에 대해 궁금한 점이나 하고 싶은 질문을 남겨주세요. 보내주신 질문은 모두 이 페이지에 모아 보여드립니다.</p>
    <form id="questionForm">
        <label for="questionInput">질문</label><br>
        <textarea id="questionInput" placeholder="여기에 질문을 입력하세요"></textarea><br>
        <button type="submit">보내기</button>
    </form>
    <section id="questionsList">
        <h2>모든 질문</h2>
        <div id="questionsContainer"></div>
    </section>

    <script>
        const form = document.getElementById('questionForm');
        const input = document.getElementById('questionInput');
        const container = document.getElementById('questionsContainer');

        function loadQuestions() {
            const stored = localStorage.getItem('questions');
            return stored ? JSON.parse(stored) : [];
        }

        function saveQuestions(list) {
            localStorage.setItem('questions', JSON.stringify(list));
        }

        function renderQuestions() {
            const list = loadQuestions();
            container.innerHTML = '';
            if (list.length === 0) {
                container.textContent = '아직 질문이 없습니다.';
                return;
            }
            list.forEach(q => {
                const div = document.createElement('div');
                div.className = 'question';
                div.textContent = q;
                container.appendChild(div);
            });
        }

        form.addEventListener('submit', e => {
            e.preventDefault();
            const text = input.value.trim();
            if (!text) return;
            const list = loadQuestions();
            list.push(text);
            saveQuestions(list);
            input.value = '';
            renderQuestions();
        });

        renderQuestions();
    </script>
</body>
</html>
